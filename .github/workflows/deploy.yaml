name: Deploy Vite React App to cPanel via FTP

concurrency:
  group: production-deployment
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  sync-global-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect asset changes
        id: check_assets_changes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE "(^|/)assets/(fonts|images|videos|documents|raw)/" || [[ "$COMMIT_MSG" == *"[force-assets-sync]"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Sync assets
        if: steps.check_assets_changes.outputs.changed == 'true'
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -u "$FTP_USER","$FTP_PASS" "$FTP_HOST"
          mirror -R --verbose --only-newer --parallel=5 assets/ assets/
          bye
          LFTP

      - name: Sync locales
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST'
          mirror -R --verbose --only-newer --parallel=5 assets/locales/ assets/locales/;
          bye
          LFTP

  build-and-deploy:
    needs: sync-global-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install -g npm@12.0.0

      - name: Build main + admin + mobile-app
        run: |
          npm run build:main
          npm run build:admin
          npm run build:mobile-app

      - name: Package mobile app update bundle
        run: |
          sudo apt-get update -qq && sudo apt-get install -y zip
          mkdir -p mobile-app-bundle
          (cd dist/mobile-app && zip -r -q ../../mobile-app-bundle/latest.zip . -x ".*")
          CHECKSUM=$(sha256sum mobile-app-bundle/latest.zip | awk '{print $1}')
          VERSION=$(git rev-parse --short=12 HEAD)
          printf '{"version":"%s","checksum":"%s"}' "$VERSION" "$CHECKSUM" > mobile-app-bundle/latest.json
          echo "Packaged mobile app bundle version $VERSION"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy apps in lftp
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -u "$FTP_USER","$FTP_PASS" "$FTP_HOST"

          mirror -R --verbose --parallel=5 \
            --exclude-glob .git* \
            --exclude-glob node_modules/ \
            --exclude-glob assets/fonts/ \
            --exclude-glob assets/images/ \
            --exclude-glob assets/videos/ \
            --exclude-glob assets/documents/ \
            --exclude-glob assets/raw/ \
            dist/static/ public_html/
          
          put -O public_html/ domains/Main/.htaccess
          mirror -R --verbose --parallel=5 -x ^Admin/ src/scripts/ public_html/scripts/
          mirror -R --verbose --parallel=5 bot/ public_html/bot/
          mirror -R --verbose --parallel=5 public/.well-known/ public_html/.well-known/

          mirror -R --verbose --parallel=5 public/.well-known/ admin.harvestschools.com/.well-known/
          mirror -R --verbose --parallel=5 --exclude-glob .git* dist/admin/ admin.harvestschools.com/
          put -O admin.harvestschools.com/ domains/Admin/.htaccess
          mirror -R --verbose --parallel=5 src/scripts/ admin.harvestschools.com/scripts/
          
          set cmd:fail-exit no
          mv app.harvestschools.com/latest.zip app.harvestschools.com/stable.zip
          mv app.harvestschools.com/latest.json app.harvestschools.com/stable.json
          
          set cmd:fail-exit yes
          put -O app.harvestschools.com/ mobile-app-bundle/latest.zip
          put -O app.harvestschools.com/ mobile-app-bundle/latest.json
          put -O app.harvestschools.com/ domains/MobileApp/.htaccess
          
          bye
          LFTP