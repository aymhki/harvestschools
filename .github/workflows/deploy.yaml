name: Deploy Vite React App to cPanel
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for changes in asset subfolders
        id: check_assets_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q -E "public/assets/(fonts|images|videos|documents)/"; then
            echo "assets_changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in assets subfolders"
          else
            echo "assets_changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in assets subfolders"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to cPanel via lftp
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            set ftp:passive-mode yes;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftps://${{ secrets.FTP_SERVER }};
            mirror -R --verbose \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              --exclude-glob assets/fonts/ \
              --exclude-glob assets/images/ \
              --exclude-glob assets/videos/ \
              --exclude-glob assets/documents/ \
              dist/static/ /public_html/;
            quit
          " 

      - name: Update index.html
        run: |
          lftp -e "set ssl:verify-certificate no; put -O /public_html dist/static/index.html; quit" -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}

      - name: Sync assets folder with lftp
        if: steps.check_assets_changes.outputs.assets_changed == 'true'
        run: |
          echo "Syncing entire assets folder as changes were detected in excluded subfolders"
          lftp -e "set ssl:verify-certificate no; set mirror:use-pget-n 5; set mirror:parallel-transfer-count 2; set xfer:log 1; mirror -R --verbose --log=upload.log --parallel=2 dist/static/assets /public_html/assets; quit" -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}


      - name: Debug - List workspace contents
        run: |
          echo "Current directory: $PWD"
          echo "Listing root directory contents:"
          ls -la
          echo "Listing repository contents:"
          ls -la $GITHUB_WORKSPACE

      - name: Sync scripts folder with lftp
        run: |
          echo "Syncing scripts folder to public_html/scripts"
          lftp -e "set ssl:verify-certificate no; set mirror:use-pget-n 5; set mirror:parallel-transfer-count 2; set xfer:log 1; mirror -R --verbose --log=scripts_upload.log --parallel=2 $GITHUB_WORKSPACE/src/scripts /public_html/scripts; quit" -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
          
