name: Deploy Vite React App to cPanel via FTP

concurrency:
  group: production-deployment
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  sync-global-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect asset changes
        id: check_assets_changes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE "(^|/)assets/(fonts|images|videos|documents|raw)/" || [[ "$COMMIT_MSG" == *"[force-assets-sync]"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Sync assets
        if: steps.check_assets_changes.outputs.changed == 'true'
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -u "$FTP_USER","$FTP_PASS" "$FTP_HOST"
          mirror -R --verbose --only-newer --parallel=5 assets/ assets/
          bye
          LFTP

      - name: Sync locales
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST'
          mirror -R --verbose --only-newer --parallel=5 assets/locales/ assets/locales/;
          bye
          LFTP

  build-and-deploy:
    needs: sync-global-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build main + admin
        run: |
          npm run build:main
          npm run build:admin

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy apps in lftp
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          lftp << LFTP
          set ssl:verify-certificate yes
          set ftp:passive-mode yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -u "$FTP_USER","$FTP_PASS" "$FTP_HOST"

          mirror -R --verbose --parallel=5 \
            --exclude-glob .git* \
            --exclude-glob node_modules/ \
            --exclude-glob assets/fonts/ \
            --exclude-glob assets/images/ \
            --exclude-glob assets/videos/ \
            --exclude-glob assets/documents/ \
            --exclude-glob assets/raw/ \
            dist/static/ public_html/
          
          put -O public_html/ domains/Main/.htaccess
          mirror -R --verbose --parallel=5 -x ^Admin/ src/scripts/ public_html/scripts/
          mirror -R --verbose --parallel=5 whatsapp-bot/ public_html/whatsapp-bot/

          mirror -R --verbose --parallel=5 --exclude-glob .git* dist/admin/ admin.harvestschools.com/
          put -O admin.harvestschools.com/ domains/Admin/.htaccess
          mirror -R --verbose --parallel=5 src/scripts/Admin/ admin.harvestschools.com/scripts/Admin/
          mirror -R --verbose --parallel=5 src/scripts/Public/General/ admin.harvestschools.com/scripts/Public/General/
          put -O admin.harvestschools.com/scripts/ src/scripts/headers.php

          bye
          LFTP