name: Deploy Vite React App to cPanel via SSH
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for changes in asset subfolders
        id: check_assets_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q -E "public/assets/(fonts|images|videos|documents)/"; then
            echo "assets_changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in assets subfolders"
          else
            echo "assets_changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in assets subfolders"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy static files (excluding heavy assets)
        run: |
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude '.git*' \
            --exclude 'node_modules' \
            --exclude 'assets/fonts' \
            --exclude 'assets/images' \
            --exclude 'assets/videos' \
            --exclude 'assets/documents' \
            dist/static/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/

      - name: Update index.html
        run: |
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" dist/static/index.html ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/index.html

      - name: Sync assets folder (Conditional)
        if: steps.check_assets_changes.outputs.assets_changed == 'true'
        run: |
          echo "Syncing entire assets folder as changes were detected in excluded subfolders"
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" dist/static/assets/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/assets/

      - name: Debug - List workspace contents
        run: |
          echo "Current directory: $PWD"
          ls -la
          echo "Listing repository contents:"
          ls -la $GITHUB_WORKSPACE

      - name: Sync scripts folder
        run: |
          echo "Syncing scripts folder to public_html/scripts"
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" src/scripts/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/scripts/