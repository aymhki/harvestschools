name: Deploy Vite React App to cPanel via FTP
concurrency:
  group: production-deployment
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  sync-global-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for changes in asset subfolders
        id: check_assets_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q -E "(^|/)assets/(fonts|images|videos|documents|raw)/" || [[ "$COMMIT_MSG" == *"[force-assets-sync]"* ]]; then
            echo "assets_changed=true" >> $GITHUB_OUTPUT
          else
            echo "assets_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync assets to server home directory (conditional)
        if: steps.check_assets_changes.outputs.assets_changed == 'true'
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose --only-newer assets/ assets/
          "

  build-and-deploy-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v3
        with:
          node-version: 'latest'


      - run: npm install
      - run: npm run build:main
      - run: sudo apt-get update && sudo apt-get install -y lftp


      - name: Deploy main static files
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose \
            --exclude-glob '.git*' \
            --exclude-glob 'node_modules/' \
            --exclude-glob 'assets/fonts/' \
            --exclude-glob 'assets/images/' \
            --exclude-glob 'assets/videos/' \
            --exclude-glob 'assets/documents/' \
            --exclude-glob 'assets/raw/' \
            dist/static/ public_html/
          "

      - name: Deploy Main .htaccess
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          put -O public_html/ domains/Main/.htaccess
          "


      - name: Update main index.html
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          put -O public_html/ dist/static/index.html
          "


      - name: Sync scripts folder
        run: |
          echo "Syncing scripts folder to public_html/scripts"
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose -x '^Admin/' src/scripts/ public_html/scripts/
          "

      - name: Sync whatsapp-bot folder
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose whatsapp-bot/ public_html/whatsapp-bot/
          "

  build-and-deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - run: npm install
      - run: npm run build:admin
      - run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy admin portal
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose \
            --exclude-glob '.git*' \
            dist/admin/ admin.harvestschools.com/
          "

      - name: Deploy Admin .htaccess
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          put -O admin.harvestschools.com/ domains/Admin/.htaccess
          "

      - name: Sync scripts
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose src/scripts/Admin/ admin.harvestschools.com/scripts/Admin/;
          mirror -R --verbose src/scripts/Public/General/ admin.harvestschools.com/scripts/Public/General/;
          put -O admin.harvestschools.com/scripts/ src/scripts/headers.php
          "

