name: Deploy Vite React App to cPanel via FTP
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for changes in asset subfolders
        id: check_assets_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q -E "public/assets/(fonts|images|videos|documents|raw)/"; then
            echo "assets_changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in assets subfolders"
          else
            echo "assets_changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in assets subfolders"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static files (excluding heavy assets)
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose \
            --exclude-glob '.git*' \
            --exclude-glob 'node_modules/' \
            --exclude-glob 'assets/fonts/' \
            --exclude-glob 'assets/images/' \
            --exclude-glob 'assets/videos/' \
            --exclude-glob 'assets/documents/' \
            --exclude-glob 'assets/raw/' \
            dist/static/ public_html/
          "

      - name: Update index.html
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          put -O public_html/ dist/static/index.html
          "

      - name: Sync assets folder (Conditional)
        if: steps.check_assets_changes.outputs.assets_changed == 'true'
        run: |
          echo "Syncing entire assets folder as changes were detected in excluded subfolders"
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose dist/static/assets/ public_html/assets/
          "

      - name: Debug - List workspace contents
        run: |
          echo "Current directory: $PWD"
          ls -la
          echo "Listing repository contents:"
          ls -la $GITHUB_WORKSPACE

      - name: Sync scripts folder
        run: |
          echo "Syncing scripts folder to public_html/scripts"
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
          mirror -R --verbose src/scripts/ public_html/scripts/
          "